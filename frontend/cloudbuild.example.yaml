steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - REGION-docker.pkg.dev/PROJECT_ID/cloud-run-source-deploy/sales-hub-web:latest
      - --build-arg
      - NEXT_PUBLIC_API_URL=https://YOUR_BACKEND_URL
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_API_KEY=CHANGE_ME
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=PROJECT_ID.firebaseapp.com
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=PROJECT_ID
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=CHANGE_ME
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_APP_ID=CHANGE_ME
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_VAPID_KEY=CHANGE_ME
      - .

images:
  - REGION-docker.pkg.dev/PROJECT_ID/cloud-run-source-deploy/sales-hub-web:latest
